<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Stack Music Production Masterclass</title>
    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #1a1d24;
            --bg-hover: #232730;
            --primary: #00e5ff;
            --primary-glow: rgba(0, 229, 255, 0.4);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 320px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .brand {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .brand h1 {
            font-size: 1.2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .progress-container {
            margin-top: 15px;
            background: var(--bg-dark);
            border-radius: 8px;
            padding: 10px;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar-bg {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--primary);
        }

        .nav-links {
            padding: 15px 0;
            flex-grow: 1;
        }

        .nav-item {
            padding: 12px 24px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
            font-size: 0.95rem;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background-color: var(--bg-hover);
            color: var(--text-main);
        }

        .nav-item.active {
            background-color: var(--bg-hover);
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }

        /* Main Content Styles */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        .header {
            padding: 24px 40px;
            border-bottom: 1px solid var(--border);
            background-color: var(--bg-dark);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-bar {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 20px;
            width: 300px;
            outline: none;
            transition: border 0.3s;
        }

        .search-bar:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px var(--primary-glow);
        }

        .content-body {
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .phase-title {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .phase-desc {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* Accordion Styles */
        .module {
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .module.completed {
            border-color: var(--success);
        }

        .module-header {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            background-color: var(--bg-panel);
            transition: background-color 0.2s;
        }

        .module-header:hover {
            background-color: var(--bg-hover);
        }

        .checkbox {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 4px;
            margin-right: 15px;
            cursor: pointer;
            position: relative;
            background: var(--bg-dark);
            transition: all 0.2s;
        }

        .checkbox:checked {
            background: var(--success);
            border-color: var(--success);
        }

        .checkbox:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .module-title {
            flex-grow: 1;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .module-title span {
            color: var(--primary);
            margin-right: 8px;
        }

        .module-toggle {
            color: var(--text-muted);
            transition: transform 0.3s;
        }

        .module.open .module-toggle {
            transform: rotate(180deg);
        }

        .module-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: var(--bg-dark);
        }

        .module-content-inner {
            padding: 20px;
            border-top: 1px solid var(--border);
            line-height: 1.7;
            color: #cbd5e1;
        }

        .action-item {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 229, 255, 0.05);
            border-left: 4px solid var(--primary);
            border-radius: 0 8px 8px 0;
        }

        .action-item strong {
            color: var(--primary);
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>

                topics:[
                    "Nyquist-Shannon Theorem: Mathematically prove why a digital system must sample at over twice the highest frequency (fs > 2 * fmax) to perfectly reconstruct an analog wave.",
                    "Quantization & Bit Depth: Calculate digital dynamic range using the 6 dB per bit rule, understanding exactly how discrete binary values map to continuous analog voltages.",
                    "Aliasing & Anti-Aliasing: Visualize how frequencies exceeding the Nyquist limit 'fold back' as ugly harmonic distortion, and why analog low-pass filters are required before conversion.",
                    "Sampling Theory: Understand the math of impulse trains and how the digital-to-analog converter (DAC) uses a 'sinc' function to perfectly smooth staircase data into continuous sound.",
                    "Fixed vs. Floating-Point: Understand why 32-bit floating-point processing provides effectively infinite internal headroom (+770 dB), making it impossible to clip audio inside modern DAWs.",
                    "Fourier Transform (FFT): Break down the complex calculus that converts a time-domain waveform into a frequency-domain spectrum, the engine behind every EQ and analyzer.",
                    "Spectral Leakage & Windowing: Apply mathematical Hanning and Hamming window functions to smooth out the edges of audio blocks before FFT analysis, preventing false frequency spikes.",
                    "Z-Transform Theory: Cross the bridge from continuous Laplace transforms into discrete digital time, mapping filter poles and zeros on the complex Z-plane.",
                    "FIR Filters: Design Finite Impulse Response filters that offer perfect linear phase, relying on heavy CPU math (convolution) without any feedback loops.",
                    "IIR Filters: Construct Infinite Impulse Response filters that use feedback loops to mimic analog EQs, requiring vastly less CPU but introducing natural phase shifts.",
                    "Biquad Filter Topologies: Analyze the foundational two-pole, two-zero equation that powers 90% of the digital low-pass, high-pass, and shelving EQs in your DAW.",
                    "Zero-Delay Feedback (ZDF): Solve the mathematical paradox of digital feedback loops without introducing a one-sample delay, resulting in authentic, analog-sounding virtual synthesizer filters.",
                    "Convolution Logic: Perform point-by-point multiplication and addition of an input signal against an Impulse Response to mathematically imprint the acoustic DNA of a real room.",
                    "Delay Line Theory: Program digital ring buffers, using mathematical interpolation (linear or cubic) to read fractional delays without creating digital artifacts.",
                    "Phase Vocoding: Manipulate the FFT magnitude and phase bins separately to stretch the time of an audio file without changing its pitch, or vice-versa.",
                    "Waveshaping: Route a clean sine wave through non-linear mathematical functions (like Chebyshev polynomials) to explicitly generate specific harmonic distortion and overdrive.",
                    "Dynamics Detection: Code the difference between absolute Peak detection (instant digital clips), RMS (average mathematical power), and VU (analog modeled ballistics).",
                    "Envelope Following: Calculate exponential decay curves using the classic Time Constant math (T = RC) to build the brain of digital compressors and gates.",
                    "Look-ahead Logic: Implement invisible circular buffers that delay the audio by a few milliseconds, giving your brickwall limiter time to calculate math and catch instantaneous transients.",
                    "Dithering & Noise Shaping: Use Triangular Probability Density Function (TPDF) noise to scramble the lowest bit of audio, mathematically converting truncation distortion into analog-style tape hiss.",
                    "Oversampling Mastery: Run specific plugin algorithms internally at 4x or 8x the sample rate (e.g., 192kHz) to process saturation cleanly, filtering out aliasing before dropping back to 48kHz.",
                    "Phase Correlation: Use trigonometric analysis (+1 to -1) to mathematically calculate stereo width and ensure the Left and Right channels aren't canceling out the mono center.",
                    "All-pass Filters: Design filters that do absolutely nothing to the frequency magnitude but radically alter the phase, useful for spreading out sharp transients and fixing stereo width.",
                    "Feedback Delay Networks (FDN): Connect a matrix of delays and all-pass filters where the outputs feed back into the inputs, mathematically generating lush, algorithmic reverbs like the Valhalla series.",
                    "Pitch Detection Algorithms: Code Autocorrelation and YIN methods, tracking the repeating zero-crossings of a waveform to tell Auto-Tune exactly what note the singer is hitting.",
                    "SIMD & Optimization: Write low-level C++ code that utilizes Single Instruction, Multiple Data (SIMD) CPU instructions to process four audio channels simultaneously, saving massive CPU load.",
                    "Buffer Management: Architect robust audio engine code that handles incoming blocks of sample data gracefully, preventing CPU spikes, audio dropouts, and digital jitter.",
                    "Sample Rate Conversion (SRC): Use mathematically intense polyphase FIR filters to downsample audio (e.g., 96k to 44.1k) transparently without introducing ringing or aliasing artifacts.",
                    "Neural DSP Inference: Map out how matrix multiplications inside a trained neural network process real-time guitar signals (NAM) or vocal transformations without crashing your processor.",
                    "Physical Modeling Math: Translate the physics of the real world—solving the 1D Wave Equation—to code hyper-realistic virtual strings, tubes, and membranes mathematically from scratch."
                ]
            }
        ];

        // System Variables
        let currentPhaseId = 1;
        let userProgress = JSON.parse(localStorage.getItem('masterclass_progress')) || {};

        // DOM Elements
        const navLinksContainer = document.getElementById('nav-links');
        const contentBody = document.getElementById('content-body');
        const searchInput = document.getElementById('search-input');
        const progressFill = document.getElementById('progress-fill');
        const progressPercentage = document.getElementById('progress-percentage');
        const currentPhaseDisplay = document.getElementById('current-phase-display');

        // Initialization
        function init() {
            renderSidebar();
            renderPhase(currentPhaseId);
            updateOverallProgress();
        }

        // Render Navigation Links in Sidebar
        function renderSidebar() {
            navLinksContainer.innerHTML = '';
            courseData.forEach(phase => {
                const navItem = document.createElement('div');
                navItem.className = `nav-item ${phase.id === currentPhaseId ? 'active' : ''}`;
                navItem.innerText = phase.title.split(':')[0]; // e.g. "Phase 1"
                navItem.onclick = () => {
                    currentPhaseId = phase.id;
                    searchInput.value = ''; // clear search on phase change
                    renderSidebar(); // Update active state
                    renderPhase(currentPhaseId);
                };
                navLinksContainer.appendChild(navItem);
            });
        }

        // Action Item Generator (adds interactivity to the text)
        function generateActionItem(title) {
            const actions =[
                "Open your DAW right now and try replicating this concept on a basic sine wave or drum loop.",
                "Find a commercial track you love and actively listen to identify how they applied this technique.",
                "Spend 15 minutes today experimenting with this exact parameter without looking at the visual analyzer.",
                "Map this parameter to a physical knob on your MIDI controller to build muscle memory.",
                "Save this configuration as a preset in your DAW to speed up your workflow tomorrow."
            ];
            // Pick a random action or base it on title length for determinism
            const randomAction = actions[title.length % actions.length];
            return `<strong>Action Item:</strong> ${randomAction}`;
        }

        // Render Content for a specific Phase
        function renderPhase(phaseId, filterText = '') {
            contentBody.innerHTML = '';
            
            // Find Phase Data
            const phase = courseData.find(p => p.id === phaseId);
            currentPhaseDisplay.innerText = phase.title;

            // Phase Title & Desc
            if(!filterText) {
                const titleEl = document.createElement('h2');
                titleEl.className = 'phase-title';
                titleEl.innerText = phase.title;
                
                const descEl = document.createElement('p');
                descEl.className = 'phase-desc';
                descEl.innerText = phase.desc;

                contentBody.appendChild(titleEl);
                contentBody.appendChild(descEl);
            }

            // Render Topics
            phase.topics.forEach((topicStr, index) => {
                const splitIndex = topicStr.indexOf(':');
                const title = topicStr.substring(0, splitIndex).trim();
                const content = topicStr.substring(splitIndex + 1).trim();
                const topicId = `p${phaseId}_t${index}`; // unique ID for saving progress

                // Search Filter Logic
                if (filterText) {
                    const searchStr = filterText.toLowerCase();
                    if (!title.toLowerCase().includes(searchStr) && !content.toLowerCase().includes(searchStr)) {
                        return; // Skip rendering if doesn't match search
                    }
                }

                // Create Accordion Module
                const moduleDiv = document.createElement('div');
                const isCompleted = userProgress[topicId];
                moduleDiv.className = `module ${isCompleted ? 'completed' : ''}`;

                // Header
                const headerDiv = document.createElement('div');
                headerDiv.className = 'module-header';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'checkbox';
                checkbox.checked = !!isCompleted;
                
                // Prevent accordion toggle when clicking checkbox
                checkbox.onclick = (e) => {
                    e.stopPropagation();
                    toggleProgress(topicId, checkbox.checked, moduleDiv);
                };

                const titleDiv = document.createElement('div');
                titleDiv.className = 'module-title';
                titleDiv.innerHTML = `<span>${index + 1}.</span> ${title}`;

                const toggleIcon = document.createElement('div');
                toggleIcon.className = 'module-toggle';
                toggleIcon.innerHTML = '▼';

                headerDiv.appendChild(checkbox);
                headerDiv.appendChild(titleDiv);
                headerDiv.appendChild(toggleIcon);

                // Body Content
                const contentDiv = document.createElement('div');
                contentDiv.className = 'module-content';
                
                const innerDiv = document.createElement('div');
                innerDiv.className = 'module-content-inner';
                innerDiv.innerText = content;

                // Interactive Action Item
                const actionItemDiv = document.createElement('div');
                actionItemDiv.className = 'action-item';
                actionItemDiv.innerHTML = generateActionItem(title);
                
                innerDiv.appendChild(actionItemDiv);
                contentDiv.appendChild(innerDiv);

                // Toggle Accordion Logic
                headerDiv.onclick = () => {
                    const isOpen = moduleDiv.classList.contains('open');
                    
                    // Close all others (optional: comment out to allow multiple open)
                    document.querySelectorAll('.module').forEach(mod => {
                        mod.classList.remove('open');
                        mod.querySelector('.module-content').style.maxHeight = null;
                    });

                    if (!isOpen) {
                        moduleDiv.classList.add('open');
                        contentDiv.style.maxHeight = contentDiv.scrollHeight + "px";
                    }
                };

                moduleDiv.appendChild(headerDiv);
                moduleDiv.appendChild(contentDiv);
                contentBody.appendChild(moduleDiv);
            });

            if(contentBody.innerHTML === '') {
                contentBody.innerHTML = '<p style="color:var(--text-muted)">No matching topics found in this phase.</p>';
            }
        }

        // Save progress to LocalStorage
        function toggleProgress(topicId, isChecked, moduleDiv) {
            userProgress[topicId] = isChecked;
            localStorage.setItem('masterclass_progress', JSON.stringify(userProgress));
            
            if(isChecked) {
                moduleDiv.classList.add('completed');
            } else {
                moduleDiv.classList.remove('completed');
            }
            updateOverallProgress();
        }

        // Calculate and animate overall progress bar
        function updateOverallProgress() {
            let totalTopics = 0;
            courseData.forEach(phase => totalTopics += phase.topics.length);
            
            const completedTopics = Object.values(userProgress).filter(val => val === true).length;
            const percentage = Math.round((completedTopics / totalTopics) * 100) || 0;
            
            progressFill.style.width = percentage + '%';
            progressPercentage.innerText = percentage + '%';
        }

        // Global Search Functionality
        searchInput.addEventListener('input', (e) => {
            const text = e.target.value;
            renderPhase(currentPhaseId, text);
            // If searching, display custom text
            if(text) {
                currentPhaseDisplay.innerText = `Search Results in Phase ${currentPhaseId}`;
            } else {
                currentPhaseDisplay.innerText = courseData.find(p => p.id === currentPhaseId).title;
            }
        });

        // Start App
        init();

    </script>
</body>
</html>
